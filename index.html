<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شات دجانجو و Pusher</title>
    <script src="https://js.pusher.com/8.0.1/pusher.min.js"></script>
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .container { width: 90%; max-width: 900px; height: 80vh; background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-radius: 12px; display: flex; overflow: hidden; }
        
        /* القسم الجانبي (المستندات والقنوات) */
        .sidebar { width: 30%; border-left: 1px solid #e0e0e0; background: #fafafa; display: flex; flex-direction: column; padding: 15px; }
        .auth-box, .channel-box { margin-bottom: 20px; }
        input, button { width: 100%; padding: 10px; margin-top: 8px; border-radius: 6px; border: 1px solid #ccc; outline: none; }
        button { background: #007bff; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background: #0056b3; }
        .channel-list { list-style: none; margin-top: 10px; overflow-y: auto; }
        .channel-item { padding: 10px; background: #eee; margin-bottom: 5px; border-radius: 6px; cursor: pointer; text-align: center; }
        .channel-item.active { background: #007bff; color: white; }

        /* قسم المحادثة الرئيسي */
        .chat-area { width: 70%; display: flex; flex-direction: column; background: #fff; }
        .chat-header { padding: 15px; background: #f8f9fa; border-bottom: 1px solid #e0e0e0; font-weight: bold; font-size: 1.2rem; }
        .messages-box { flex: 1; padding: 20px; overflow-y: auto; background: #f9f9f9; display: flex; flex-direction: column; gap: 10px; }
        
        /* فقاعات الرسائل */
        .msg { max-width: 70%; padding: 10px 14px; border-radius: 15px; font-size: 0.95rem; line-height: 1.4; position: relative; }
        .msg.me { background: #007bff; color: white; align-self: flex-start; border-bottom-right-radius: 2px; }
        .msg.other { background: #e4e6eb; color: black; align-self: flex-end; border-bottom-left-radius: 2px; }
        .msg-sender { font-size: 0.75rem; display: block; margin-bottom: 4px; opacity: 0.8; }

        .input-area { padding: 15px; display: flex; gap: 10px; border-top: 1px solid #e0e0e0; }
        .input-area input { flex: 1; margin: 0; }
        .input-area button { width: auto; padding: 10px 20px; margin: 0; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <div class="sidebar">
        <div id="auth-section" class="auth-box">
            <h3>تسجيل الدخول</h3>
            <input type="text" id="username" placeholder="اسم المستخدم">
            <input type="password" id="password" placeholder="كلمة المرور">
            <button onclick="login()">دخول</button>
            <button onclick="register()" style="background:#28a745; margin-top:5px;">إنشاء حساب جديد</button>
        </div>

        <div id="user-info" class="auth-box hidden">
            <p>مرحباً: <strong id="current-user"></strong></p>
            <button onclick="logout()" style="background:#dc3545;">خروج</button>
        </div>
        
        <hr style="margin: 15px 0; border: 0; border-top: 1px solid #eee;">

        <div class="channel-box">
            <h3>القنوات</h3>
            <input type="text" id="new-channel-name" placeholder="اسم القناة الجديدة">
            <button onclick="createChannel()">+ إنشاء قناة</button>
            <ul class="channel-list" id="channels-ul"></ul>
        </div>
    </div>

    <div class="chat-area">
        <div class="chat-header" id="active-chat-title">اختر قناة لبدء المحادثة</div>
        <div class="messages-box" id="messages-container"></div>
        <div class="input-area">
            <input type="text" id="message-input" placeholder="اكتب رسالتك هنا..." onkeypress="if(event.key === 'Enter') sendMessage()">
            <button onclick="sendMessage()">إرسال</button>
        </div>
    </div>
</div>

<script>
    // الإعدادات والمتغيرات الأساسية
    const API_BASE_URL = "http://127.0.0.1:8000/api";
    let accessToken = localStorage.getItem("access_token") || null;
    let currentUsername = localStorage.getItem("username") || null;
    let activeChannelId = null;
    let pusher = null;
    let currentSubscription = null;

    // تهيئة Pusher بمفاتيحك الخاصة التي أرفقتها سابقاً
    const PUSHER_KEY = "91042c0154393873a10a";
    const PUSHER_CLUSTER = "eu";

    // تشغيل تلقائي عند فتح الصفحة للتحقق من الجلسة
    if (accessToken) { showUiForLoggedInUser(); }

    function showUiForLoggedInUser() {
        document.getElementById("auth-section").classList.add("hidden");
        document.getElementById("user-info").classList.remove("hidden");
        document.getElementById("current-user").innerText = currentUsername;
        initPusher();
        loadChannels();
    }

    // 1. نظام الحسابات (تسجيل ودخول)
    async function register() {
        const u = document.getElementById("username").value;
        const p = document.getElementById("password").value;
        const res = await fetch(`${API_BASE_URL}/register/`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username: u, password: p })
        });
        const data = await res.json();
        if (res.ok) { alert("تم إنشاء الحساب! يمكنك تسجيل الدخول الآن."); } 
        else { alert(data.error || "فشل التسجيل"); }
    }

    async function login() {
        const u = document.getElementById("username").value;
        const p = document.getElementById("password").value;
        const res = await fetch(`${API_BASE_URL}/login/`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username: u, password: p })
        });
        const data = await res.json();
        if (res.ok) {
            accessToken = data.access;
            currentUsername = u;
            localStorage.setItem("access_token", accessToken);
            localStorage.setItem("username", currentUsername);
            showUiForLoggedInUser();
        } else { alert("اسم المستخدم أو كلمة المرور خاطئة"); }
    }

    function logout() {
        localStorage.clear();
        location.reload();
    }

    // 2. إدارة القنوات والمحادثات
    async function loadChannels() {
        const res = await fetch(`${API_BASE_URL}/channels/`, {
            headers: { "Authorization": `Bearer ${accessToken}` }
        });
        if (!res.ok) return;
        const channels = await res.json();
        const ul = document.getElementById("channels-ul");
        ul.innerHTML = "";
        channels.forEach(ch => {
            const li = document.createElement("li");
            li.className = `channel-item ${activeChannelId == ch.id ? 'active' : ''}`;
            li.innerText = ch.name;
            li.onclick = () => selectChannel(ch.id, ch.name);
            ul.appendChild(li);
        });
    }

    async function createChannel() {
        const name = document.getElementById("new-channel-name").value;
        if(!name) return;
        const res = await fetch(`${API_BASE_URL}/channels/create/`, {
            method: "POST",
            headers: { "Content-Type": "application/json", "Authorization": `Bearer ${accessToken}` },
            body: JSON.stringify({ name: name })
        });
        if(res.ok) {
            document.getElementById("new-channel-name").value = "";
            loadChannels();
        }
    }

    // 3. اختيار القناة والربط مع Pusher
    async function selectChannel(id, name) {
        activeChannelId = id;
        document.getElementById("active-chat-title").innerText = `قناة: ${name}`;
        loadChannels(); // لتحديث التصميم النشط البصري فقط
        
        // جلب الأرشيف القديم من الداتا بيز عبر الـ API
        const res = await fetch(`${API_BASE_URL}/channels/${id}/messages/`, {
            headers: { "Authorization": `Bearer ${accessToken}` }
        });
        const messages = await res.json();
        const container = document.getElementById("messages-container");
        container.innerHTML = "";
        messages.forEach(msg => appendMessageHtml(msg.user_username || msg.user, msg.content));

        // الاستماع الفوري للرسائل الجديدة للقناة المحددة عبر Pusher
        if (currentSubscription) { pusher.unsubscribe(currentSubscription); }
        
        // ملاحظة: غيرنا التسمية لـ 'public-' لتجنب إعدادات التوثيق المعقدة لـ Pusher مبدئياً
        currentSubscription = `public-chat-${id}`;
        const channel = pusher.subscribe(currentSubscription);
        
        channel.bind('new-message', function(data) {
            // نتحقق إن كانت الرسالة قادمة من شخص آخر لتجنب تكرارها عند المرسل
            if (data.username !== currentUsername) {
                appendMessageHtml(data.username, data.message);
            }
        });
    }

    // 4. إرسال الرسائل
    async function sendMessage() {
        const input = document.getElementById("message-input");
        const text = input.value.trim();
        if (!text || !activeChannelId) return;

        // إضافة الرسالة في واجهتي فوراً لسرعة الأداء (Optimistic UI)
        appendMessageHtml(currentUsername, text);
        input.value = "";

        // إرسالها للباك إند دجانجو ليقوم بحفظها وتمريرها لـ Pusher
        await fetch(`${API_BASE_URL}/messages/send/`, {
            method: "POST",
            headers: { "Content-Type": "application/json", "Authorization": `Bearer ${accessToken}` },
            body: JSON.stringify({ channel_id: activeChannelId, message: text })
        });
    }

    function appendMessageHtml(sender, text) {
        const container = document.getElementById("messages-container");
        const msgDiv = document.createElement("div");
        const isMe = sender === currentUsername;
        
        msgDiv.className = `msg ${isMe ? 'me' : 'other'}`;
        msgDiv.innerHTML = `<span class="msg-sender">${isMe ? 'أنا' : sender}</span>${text}`;
        
        container.appendChild(msgDiv);
        container.scrollTop = container.scrollHeight; // النزول لآخر رسالة تلقائياً
    }

    function initPusher() {
        pusher = new Pusher(PUSHER_KEY, { cluster: PUSHER_CLUSTER });
    }
</script>
</body>
</html>
